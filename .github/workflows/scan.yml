name: Blockchain Deposit Scanner & Withdrawal Processor

on:
  # Run on every push to main
  push:
    branches:
      - main
  # Run on schedule (every 3 minutes)
  schedule:
    - cron: '*/3 * * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scanner dependencies
        working-directory: scanner
        run: npm ci

      - name: Run deposit scanner
        working-directory: scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RPC_URL_SIDRA: ${{ secrets.RPC_URL_SIDRA }}
          RPC_URL_BSC: ${{ secrets.RPC_URL_BSC }}
          SCAN_API_KEY: ${{ secrets.SCAN_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HOT_WALLET_PRIVATE_KEY_SIDRA: ${{ secrets.HOT_WALLET_PRIVATE_KEY_SIDRA }}
          HOT_WALLET_PRIVATE_KEY_BSC: ${{ secrets.HOT_WALLET_PRIVATE_KEY_BSC }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: node index.js

      - name: Process pending withdrawals
        working-directory: scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RPC_URL_SIDRA: ${{ secrets.RPC_URL_SIDRA }}
          RPC_URL_BSC: ${{ secrets.RPC_URL_BSC }}
          HOT_WALLET_PRIVATE_KEY_SIDRA: ${{ secrets.HOT_WALLET_PRIVATE_KEY_SIDRA }}
          HOT_WALLET_PRIVATE_KEY_BSC: ${{ secrets.HOT_WALLET_PRIVATE_KEY_BSC }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: node process-withdrawals.js
